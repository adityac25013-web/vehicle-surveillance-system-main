<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Vehicle Surveillance Dashboard</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1>Surveillance Enhanced Vehicle Tracking</h1>
        <div class="top-actions">
          <span class="status-dot" id="backend-status" title="Backend status"></span>
          <button id="reset-demo">Reset Demo</button>
        </div>
      </header>

      <div id="alert-banner" class="alert-banner" hidden></div>

      <section class="panel panel-controls">
        <div class="control-group">
          <label for="demo-mode-select">Demo mode</label>
          <select id="demo-mode-select">
            <option value="normal">Normal</option>
            <option value="smooth">Smooth</option>
            <option value="accurate">Accurate</option>
          </select>
        </div>
        <div class="status-chips">
          <span class="chip chip-neutral" id="chip-backend">Backend: --</span>
          <span class="chip chip-neutral" id="chip-camera">Camera: --</span>
          <span class="chip chip-neutral" id="chip-model">Model: --</span>
        </div>
      </section>

      <main class="app-main">
        <section class="panel panel-stream">
          <div class="stream-header">
            <h2>Live stream (webcam)</h2>
            <div class="stream-metrics">
              <span class="live-badge" id="live-badge">LIVE</span>
              <span class="metric-badge" id="fps-badge">FPS: --</span>
              <span class="metric-badge" id="inference-badge">Inference: -- ms</span>
            </div>
          </div>
          <div class="stream-wrap">
            <img
              id="video-stream"
              src=""
              alt="Live webcam with car detection"
              crossorigin="anonymous"
            />
            <video id="camera-input" autoplay muted playsinline style="display: none"></video>
            <div class="stream-placeholder" id="stream-placeholder">
              Loading…
            </div>
          </div>
        </section>

        <section class="panel">
          <h2>Health</h2>
          <button id="ping-backend">Ping Backend</button>
          <pre id="health-result">{ }</pre>
        </section>

        <section class="panel panel-detections">
          <h2>Detected vehicles (real time)</h2>
          <div id="detections-list" class="detections-list">Waiting for data…</div>
        </section>

        <section class="panel panel-detections">
          <h2>Last detections</h2>
          <div id="recent-cards" class="recent-cards">No recent detections yet.</div>
        </section>

        <section class="panel panel-detections">
          <h2>Captured plates (history)</h2>
          <div id="history-list" class="detections-list">No plates captured yet.</div>
        </section>
      </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
  </body>
  </html>
